<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            margin:50px auto;
            padding:20px;
            background:white;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Student Registration Form</h2>

    <form action="/student/add" method="POST">

        <input
            type="text"
            name="name"
            placeholder="Enter Name"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required
        >

        <input
            type="text"
            name="course"
            placeholder="Enter Course"
            required
        >

        <input
            type="number"
            name="age"
            placeholder="Enter Age"
            required
        >

        <button type="submit">
            Add Student
        </button>

    </form>

</div>

</body>
</html>
